spring.application.name=energy-community-usage-service

# RabbitMQ defaults. Override these if your local RabbitMQ uses different settings.
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Temporary local database for development/testing.
# Later, the same entity/repository code can be pointed to PostgreSQL/MySQL by changing these properties.
spring.datasource.url=jdbc:h2:file:./data/energy-community-usage-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
